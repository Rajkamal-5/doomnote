<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doom Note - Login</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 12px; text-align: center; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #333; background: #252525; color: white; }
        button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
        .btn-google { background: #4285F4; color: white; }
        .btn-phone { background: #34A853; color: white; }
    </style>
</head>
<body>

<div class="card">
    <h2>Doom Note</h2>
    <p>Sign in to continue</p>
    
    <!-- Google Login -->
    <button class="btn-google" onclick="googleSignIn()">Continue with Google</button>
    
    <div style="margin: 20px 0; color: #666;">OR</div>

    <!-- Phone Login -->
    <input type="tel" id="phoneNumber" placeholder="+91 9876543210">
    <div id="recaptcha-container"></div>
    <button class="btn-phone" onclick="phoneSignIn()">Send OTP</button>

    <div id="otp-section" style="display:none;">
        <input type="text" id="otpCode" placeholder="Enter 6-digit OTP">
        <button class="btn-phone" onclick="verifyOTP()">Verify OTP</button>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAuQ5_YkRPh5XpanMBCiM5F4iA-Z9Cf6z0",
    authDomain: "doomnoteweb.firebaseapp.com",
    projectId: "doomnoteweb",
    storageBucket: "doomnoteweb.firebasestorage.app",
    messagingSenderId: "688981947772",
    appId: "1:688981947772:web:3361988c883c24d8bee0f9"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Google Sign In
  window.googleSignIn = () => {
    const provider = new GoogleAuthProvider();
    signInWithPopup(auth, provider).then(() => window.location.href = "index.html").catch(alert);
  };

  // Phone Sign In
  window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'invisible' });
  
  window.phoneSignIn = () => {
    const num = document.getElementById('phoneNumber').value;
    signInWithPhoneNumber(auth, num, window.recaptchaVerifier).then(result => {
        window.confirmationResult = result;
        document.getElementById('otp-section').style.display = 'block';
        alert("OTP Sent!");
    }).catch(alert);
  };

  window.verifyOTP = () => {
    const code = document.getElementById('otpCode').value;
    window.confirmationResult.confirm(code).then(() => window.location.href = "index.html").catch(alert);
  };
</script>
</body>
</html>
